<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <h1>Cadastro de nomes</h1>
    <input type="text" id="nome" placeholder="Digite um nome">
    <button onclick="adicionar()">Cadastrar</button>
    <button onclick="mostrar()">Mostrar Lista</button>

    <p id="resultado"></p>

    <script>
        let nomes = [];

        function adicionar(){
            let nome = document.getElementById("nome").value;
            if(nome != ""){
                nomes.push(nome);
                document.getElementById("nome").value ="";
            }
        }
        function mostrar(){
            let texto = "Nomes Cadastrados: <br>";
            for(let i = 0; i < nomes.length; i++){
                texto += nomes[i] + "<br>";
            }
            document.getElementById("resultado").innerHTML = texto;
        }
    </script>
</body>
</html>
